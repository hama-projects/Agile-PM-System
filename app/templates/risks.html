<!DOCTYPE html>
<html>
<head>
    <title>Risk Register</title>
    <style>
        body { font-family: Arial; margin:30px; background:#f7f7f7; }
        table {
            width:100%;
            border-collapse:collapse;
            background:white;
        }
        th, td {
            padding:10px;
            border:1px solid #ddd;
        }
        th { background:#f1f1f1; }
    </style>
</head>
<body>

<h1>Risk Register</h1>
<a href="/">← Dashboard</a>

<table>
    <tr>
        <th>ID</th>
        <th>Description</th>
        <th>Severity</th>
        <th>Mitigation</th>
    </tr>

    {% for risk in risks %}
    <tr>
        <td>{{ risk.risk_id }}</td>
        <td>{{ risk.description }}</td>
        <td>{{ risk.severity }}</td>
        <td>{{ risk.mitigation }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
